name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/root' }}"

            # 清除旧的 Git 代理和镜像配置
            git config --global --unset http.proxy || true
            git config --global --unset https.proxy || true
            git config --global --unset-all url.https://ghproxy.com/https://github.com/.insteadof || true

            # 确保 Node.js 和 pm2 已安装
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            if ! command -v node &> /dev/null; then
              echo ">>> 安装 Node.js..."
              curl -fsSL https://rpm.nodesource.com/setup_18.x | sudo bash -
              sudo dnf install -y nodejs
            fi
            if ! command -v pm2 &> /dev/null; then
              echo ">>> 安装 pm2..."
              sudo npm install -g pm2
            fi

            # 拉取最新代码
            mkdir -p ${DEPLOY_PATH}
            cd ${DEPLOY_PATH}
            if [ ! -d ".git" ]; then
              echo ">>> 初始化仓库..."
              git init
              git remote add origin https://github.com/findxme/fmHome.git
            else
              echo ">>> 更新代码..."
            fi

            git fetch origin main
            git reset --hard origin/main

            # 写入环境变量
            echo ">>> 写入 .env..."
            printf 'CLAUDE_API_KEY=%s\nCLAUDE_API_URL=%s\nNODE_ENV=production\nPORT=3001\nDB_HOST=%s\nDB_PORT=%s\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\n' \
              '${{ secrets.CLAUDE_API_KEY }}' \
              '${{ secrets.CLAUDE_API_URL }}' \
              '${{ secrets.DB_HOST }}' \
              '${{ secrets.DB_PORT }}' \
              '${{ secrets.DB_USER }}' \
              '${{ secrets.DB_PASSWORD }}' \
              '${{ secrets.DB_NAME }}' > .env

            # 安装依赖并构建前端
            echo ">>> 安装前端依赖并构建..."
            cd client
            npm ci
            npm run build
            cd ..

            echo ">>> 安装后端依赖..."
            cd server
            npm ci --only=production
            cd ..

            # 停止旧的 Docker 容器（如果有）
            docker compose down 2>/dev/null || true

            # 用 pm2 启动/重启应用
            echo ">>> 启动应用..."
            pm2 delete fmhome 2>/dev/null || true
            pm2 start server/index.js --name fmhome --cwd ${DEPLOY_PATH}
            pm2 save

            # 验证
            echo ">>> 等待服务启动..."
            sleep 5
            curl -sf http://localhost:3001/api/health \
              && echo "部署成功！" \
              || (echo "健康检查失败" && pm2 logs fmhome --lines 50 --nostream && exit 1)
