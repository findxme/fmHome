name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fmhome:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/opt/fmhome' }}"

            mkdir -p ${DEPLOY_PATH}
            cd ${DEPLOY_PATH}

            # 写入环境变量
            echo ">>> 写入 .env..."
            printf 'CLAUDE_API_KEY=%s\nCLAUDE_API_URL=%s\nNODE_ENV=production\nPORT=3001\nDB_HOST=%s\nDB_PORT=%s\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\n' \
              '${{ secrets.CLAUDE_API_KEY }}' \
              '${{ secrets.CLAUDE_API_URL }}' \
              '${{ secrets.DB_HOST }}' \
              '${{ secrets.DB_PORT }}' \
              '${{ secrets.DB_USER }}' \
              '${{ secrets.DB_PASSWORD }}' \
              '${{ secrets.DB_NAME }}' > .env

            # 创建简化的 docker-compose.yml（只运行 app，不包含构建）
            cat > docker-compose.yml << 'EOF'
version: '3.8'

services:
  app:
    image: ${{ secrets.DOCKER_USERNAME }}/fmhome:latest
    container_name: fmhome-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_API_URL=${CLAUDE_API_URL}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=fm123
      - DB_NAME=fm_home
    volumes:
      - ./data:/app/server/data
      - ./logs:/app/server/logs
    networks:
      - fmhome-network
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: fmhome-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=fm123
      - MYSQL_DATABASE=fm_home
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - fmhome-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  fmhome-network:
    driver: bridge

volumes:
  mysql-data:
EOF

            # 停止旧容器
            echo ">>> 停止旧容器..."
            docker-compose down || true

            # 拉取最新镜像
            echo ">>> 拉取最新镜像..."
            docker-compose pull

            # 启动服务
            echo ">>> 启动服务..."
            docker-compose up -d

            # 验证
            echo ">>> 等待服务启动..."
            sleep 15
            docker-compose ps
            curl -sf http://localhost:3001/api/health \
              && echo "✅ 部署成功！" \
              || (echo "❌ 健康检查失败" && docker-compose logs --tail=50 && exit 1)
